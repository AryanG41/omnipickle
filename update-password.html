<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniPickle — Reset Password</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main id="login">
    <img src="logo.jpeg" class="appLogo" alt="OmniPickle">
    <h2 class="loginTitle">Set a new password</h2>
    <p class="loginSub">Enter your new password below</p>

    <input type="password" id="newPassword" class="field" placeholder="New password">
    <button id="updateBtn" class="btnPrimary">Update password</button>

    <p id="msg" class="authMsg"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="update-password.js"></script>
</body>
</html>
